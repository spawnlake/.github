name: Feature request
description: Suggest a new capability or improvement.
title: "feat: <short summary>"
labels: ["enhancement", "triage"]
body:
  - type: input
    id: repo
    attributes:
      label: Target repository
      placeholder: e.g. spawnlake-api, boid-template, …
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do? Why does the current behaviour fall short?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: A clear and concise description of what you want to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you rejected them.

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Links, screenshots, prior art, related issues.

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and discussions and didn't find a duplicate.
          required: true
